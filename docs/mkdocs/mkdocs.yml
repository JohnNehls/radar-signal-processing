site_name: rad-lab
site_description: A Python radar module for pulse-Doppler simulation and RDM generation

docs_dir: docs
site_dir: site
use_directory_urls: false

theme:
  name: material

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            heading_level: 2
            separate_signature: false
            show_symbol_type_toc: true
            show_if_no_docstring: true

nav:
  - Home: index.md
  - API Reference:
      - rdm: api/rdm.md
      - Radar: api/pulse_doppler_radar.md
      - Waveform: api/waveform.md
      - Returns: api/returns.md
      - Range Equation: api/range_equation.md
      - RF Datacube: api/rf_datacube.md
      - ULA: api/uniform_linear_arrays.md
      - Monopulse: api/monopulse.md
      - VBM: api/vbm.md
      - Geometry: api/geometry.md
      - Noise: api/noise.md
      - Waveform Helpers: api/waveform_helpers.md
      - Utilities: api/utilities.md
      - Constants: api/constants.md
